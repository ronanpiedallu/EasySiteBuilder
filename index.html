<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>EasySite Builder PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  display: flex;
  background: #f4f6f8;
}

.sidebar {
  width: 260px;
  background: white;
  padding: 20px;
  border-right: 1px solid #ddd;
}

.editor {
  flex: 1;
  padding: 20px;
  min-height: 100vh;
}

.block {
  background: white;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 10px;
  cursor: grab;
  position: relative;
}

.delete-btn {
  position: absolute;
  top: 5px;
  right: 10px;
  color: red;
  cursor: pointer;
}

button {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border: none;
  background: #007bff;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #0056b3;
}

.export {
  background: green;
}
</style>
</head>

<body>

<div class="sidebar">
  <h3>Blocs</h3>
  <button onclick="addText()">Texte</button>
  <button onclick="addImage()">Image</button>
  <button onclick="addButton()">Bouton</button>

  <h3>Exporter</h3>
  <button class="export" onclick="downloadHTML()">Télécharger le site</button>
</div>

<div class="editor" id="editor"></div>

<script>
var editor = document.getElementById("editor");
var blocks = [];
var dragIndex = null;

function render() {
  editor.innerHTML = "";

  for (var i = 0; i < blocks.length; i++) {
    (function(index) {
      var block = blocks[index];

      var el = document.createElement("div");
      el.className = "block";
      el.draggable = true;

      // drag start
      el.ondragstart = function() {
        dragIndex = index;
      };

      // drag over
      el.ondragover = function(e) {
        e.preventDefault();
      };

      // drop
      el.ondrop = function() {
        var temp = blocks[dragIndex];
        blocks.splice(dragIndex, 1);
        blocks.splice(index, 0, temp);
        render();
      };

      // delete button
      var del = document.createElement("span");
      del.className = "delete-btn";
      del.innerText = "✖";
      del.onclick = function() {
        blocks.splice(index, 1);
        render();
      };
      el.appendChild(del);

      // content
      if (block.type === "text") {
        var txt = document.createElement("div");
        txt.contentEditable = true;
        txt.innerText = block.content;

        txt.oninput = function() {
          block.content = txt.innerText;
        };

        el.appendChild(txt);
      }

      if (block.type === "image") {
        var img = document.createElement("img");
        img.src = block.src;
        img.style.width = "100%";
        el.appendChild(img);
      }

      if (block.type === "button") {
        var btn = document.createElement("button");
        btn.innerText = block.label;
        el.appendChild(btn);
      }

      editor.appendChild(el);
    })(i);
  }
}

function addText() {
  blocks.push({ type: "text", content: "Double-clique pour modifier" });
  render();
}

function addImage() {
  var url = prompt("URL image :");
  if (url) {
    blocks.push({ type: "image", src: url });
    render();
  }
}

function addButton() {
  var label = prompt("Texte bouton :");
  if (label) {
    blocks.push({ type: "button", label: label });
    render();
  }
}

function downloadHTML() {
  var html = "<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Mon site</title></head><body>";

  for (var i = 0; i < blocks.length; i++) {
    var block = blocks[i];

    if (block.type === "text") {
      html += "<p>" + block.content + "</p>";
    }

    if (block.type === "image") {
      html += "<img src='" + block.src + "' style='max-width:100%'>";
    }

    if (block.type === "button") {
      html += "<button>" + block.label + "</button>";
    }
  }

  html += "</body></html>";

  var blob = new Blob([html], { type: "text/html" });
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "mon-site.html";
  a.click();
}
</script>

</body>
</html>
