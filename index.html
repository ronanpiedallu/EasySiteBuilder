<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>EasySite SaaS</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  display: flex;
  background: #f4f6f8;
}

.sidebar {
  width: 260px;
  background: white;
  padding: 20px;
  border-right: 1px solid #ddd;
}

.editor {
  flex: 1;
  padding: 20px;
}

.block {
  background: white;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 10px;
}

button {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border: none;
  background: #007bff;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

.topbar {
  position: fixed;
  top: 0;
  left: 260px;
  right: 0;
  background: white;
  padding: 10px;
  border-bottom: 1px solid #ddd;
}
</style>
</head>

<body>

<div class="sidebar">
  <h3>Projets</h3>
  <button onclick="newProject()">➕ Nouveau</button>
  <button onclick="saveProject()">💾 Sauvegarder</button>
  <button onclick="loadProjects()">📂 Charger</button>

  <h3>Blocs</h3>
  <button onclick="addText()">Texte</button>
  <button onclick="addImage()">Image</button>
</div>

<div class="editor" id="editor" style="margin-top:50px;"></div>

<script>
var editor = document.getElementById("editor");
var blocks = [];
var projectName = "mon-site";

// ===== Auth simple =====
var user = localStorage.getItem("user");
if (!user) {
  user = prompt("Nom utilisateur :");
  localStorage.setItem("user", user);
}

// ===== Render =====
function render() {
  editor.innerHTML = "";

  blocks.forEach(function(block, index) {
    var el = document.createElement("div");
    el.className = "block";

    if (block.type === "text") {
      var txt = document.createElement("div");
      txt.contentEditable = true;
      txt.innerText = block.content;
      txt.oninput = function() {
        block.content = txt.innerText;
      };
      el.appendChild(txt);
    }

    if (block.type === "image") {
      var img = document.createElement("img");
      img.src = block.src;
      img.style.width = "100%";
      el.appendChild(img);
    }

    editor.appendChild(el);
  });
}

// ===== Blocs =====
function addText() {
  blocks.push({ type: "text", content: "Texte..." });
  render();
}

function addImage() {
  var url = prompt("URL image :");
  if (url) {
    blocks.push({ type: "image", src: url });
    render();
  }
}

// ===== SaaS features =====
function saveProject() {
  var name = prompt("Nom du projet :", projectName);
  if (!name) return;

  projectName = name;

  var data = {
    name: name,
    blocks: blocks
  };

  var all = JSON.parse(localStorage.getItem(user + "_projects") || "[]");
  all.push(data);
  localStorage.setItem(user + "_projects", JSON.stringify(all));

  alert("✅ Projet sauvegardé");
}

function loadProjects() {
  var all = JSON.parse(localStorage.getItem(user + "_projects") || "[]");

  var list = "Choisis un projet:\n";
  all.forEach(function(p, i) {
    list += i + " - " + p.name + "\n";
  });

  var choice = prompt(list);
  if (choice === null) return;

  var p = all[choice];
  blocks = p.blocks;
  projectName = p.name;

  render();
}

function newProject() {
  blocks = [];
  projectName = "nouveau projet";
  render();
}

render();
</script>

</body>
</html>
