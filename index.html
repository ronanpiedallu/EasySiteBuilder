<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MyApps UI</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  display: flex;
  background: radial-gradient(circle at top left, #0f172a, #020617);
  color: white;
}

/* ========= SIDEBAR ========= */
.sidebar {
  width: 260px;
  height: 100vh;
  background: rgba(255,255,255,0.03);
  padding: 25px;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 40px;
}

.menu-title {
  color: #94a3b8;
  margin-bottom: 15px;
}

.menu button {
  width: 100%;
  padding: 12px;
  background: rgba(255,255,255,0.03);
  border: none;
  color: #ccc;
  margin-bottom: 10px;
  text-align: left;
  border-radius: 12px;
  cursor: pointer;
}

.menu button:hover {
  background: rgba(255,255,255,0.08);
  color: white;
}

/* ========= MAIN ========= */
.main {
  flex: 1;
  padding: 40px;
}

/* HEADER */
.topbar {
  display: flex;
  justify-content: flex-end;
  margin-bottom: 20px;
}

.login {
  background: linear-gradient(45deg, #7c3aed, #2563eb);
  border-radius: 999px;
  padding: 10px 20px;
}

/* TITRE */
h1 {
  font-size: 42px;
}

.sub {
  color: #94a3b8;
  margin-bottom: 30px;
}

/* ========= CARDS ========= */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 25px;
}

.card {
  background: linear-gradient(145deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
  padding: 25px;
  border-radius: 25px;
  position: relative;
  box-shadow: 0 0 40px rgba(124,58,237,0.2);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.icon-box {
  width: 65px;
  height: 65px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 20px;
  background: linear-gradient(45deg, #7c3aed, #2563eb);
  margin-bottom: 20px;
  font-size: 28px;
}

.card h2 {
  font-size: 28px;
  margin-bottom: 10px;
}

.card p {
  color: #94a3b8;
  margin-bottom: 20px;
}

.open-btn {
  background: linear-gradient(45deg, #7c3aed, #2563eb);
  padding: 10px 20px;
  border-radius: 999px;
  border: none;
  color: white;
}

/* ========= APP VIEW ========= */
.app-container {
  margin-top: 40px;
  display: flex;
  gap: 20px;
}

/* FLOW */
.flow {
  flex: 2;
  background: rgba(255,255,255,0.04);
  padding: 20px;
  border-radius: 20px;
}

.message {
  background: rgba(255,255,255,0.06);
  padding: 10px;
  border-radius: 12px;
  margin-bottom: 10px;
}

.input-zone {
  margin-top: 20px;
  display: flex;
  gap: 10px;
}

.input-zone input {
  flex: 1;
  padding: 10px;
  border-radius: 999px;
  border: none;
  background: rgba(255,255,255,0.05);
  color: white;
}

.send {
  background: linear-gradient(45deg, #7c3aed, #2563eb);
  border: none;
  border-radius: 999px;
  padding: 10px 15px;
  color: white;
}

/* FILES */
.files {
  flex: 1;
  background: rgba(255,255,255,0.04);
  padding: 20px;
  border-radius: 20px;
}

.file {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  margin-bottom: 10px;
}

.file span {
  color: #94a3b8;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">⚡ MyApps</div>

  <div class="menu-title">APPLICATIONS</div>
  <div class="menu">
    <button onclick="openApp()">💬 Flow</button>
    <button onclick="openApp()">📁 Files</button>
    <button>🏋️ Sport-Leveling</button>
    <button>✅ Check</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="topbar">
