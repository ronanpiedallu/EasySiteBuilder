<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Builder Pro</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
  display:flex;
  background: radial-gradient(circle at top left,#0f172a,#020617);
  color:white;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  padding:20px;
  background:rgba(255,255,255,0.03);
}

button{
  width:100%;
  margin-bottom:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:linear-gradient(45deg,#7c3aed,#2563eb);
  color:white;
}

/* MAIN */
.main{flex:1;padding:20px;}

.builder{
  display:flex;
  gap:20px;
}

/* EDITOR */
.editor{
  flex:1;
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:20px;
  min-height:500px;
}

.block{
  background:rgba(255,255,255,0.08);
  margin-bottom:10px;
  padding:10px;
  border-radius:10px;
  position:relative;
}

.block[draggable]{cursor:grab;}

.delete{
  position:absolute;
  right:10px;
  top:5px;
  cursor:pointer;
}

/* PREVIEW */
.preview{
  width:300px;
  background:white;
  color:black;
  border-radius:20px;
  padding:10px;
}

/* BUTTON STYLES */
.btn1{background:linear-gradient(45deg,#7c3aed,#2563eb);color:white;padding:10px;border-radius:20px;border:none;}
.btn2{background:transparent;border:2px solid black;padding:10px;border-radius:20px;}
.btn3{background:black;color:white;padding:10px;border-radius:20px;}
</style>
</head>

<body>

<div class="sidebar">
  <button onclick="add('title')">Titre</button>
  <button onclick="add('text')">Texte</button>
  <button onclick="add('image')">Image</button>
  <button onclick="add('button')">Bouton</button>
</div>

<div class="main">
  <div class="builder">
    <div class="editor" id="editor"></div>
    <div class="preview" id="preview"></div>
  </div>
  <button onclick="exportHTML()">📦 Export</button>
</div>

<script>
var blocks=[];
var editor=document.getElementById("editor");
var preview=document.getElementById("preview");
var dragIndex=null;

/* ADD */
function add(type){
  var data={type:type,text:""};

  if(type==="image"){
    data.src=prompt("URL image");
  }

  if(type==="button"){
    data.text="Bouton";
    data.link=prompt("Lien du bouton");
    data.style="btn1";
  }

  blocks.push(data);
  render();
}

/* RENDER */
function render(){
  editor.innerHTML="";

  blocks.forEach((b,i)=>{

    var el=document.createElement("div");
    el.className="block";
    el.draggable=true;

    el.ondragstart=()=>dragIndex=i;
    el.ondrop=()=>{
      let temp=blocks[dragIndex];
      blocks.splice(dragIndex,1);
      blocks.splice(i,0,temp);
      render();
    };
    el.ondragover=(e)=>e.preventDefault();

    /* DELETE */
    var del=document.createElement("span");
    del.innerText="✖";
    del.className="delete";
    del.onclick=()=>{
      blocks.splice(i,1);
      render();
    };
    el.appendChild(del);

    /* CONTENT */
    if(b.type==="title"){
      var t=document.createElement("input");
      t.value=b.text||"Titre";
      t.style.fontSize="24px";
      t.oninput=()=>b.text=t.value;
      el.appendChild(t);
    }

    if(b.type==="text"){
      var t=document.createElement("textarea");
      t.value=b.text||"Texte...";
      t.oninput=()=>b.text=t.value;

      var size=document.createElement("input");
      size.type="range"; size.min=10; size.max=50;
      size.value=b.size||16;
      size.oninput=()=>b.size=size.value;

      el.appendChild(t);
      el.appendChild(size);
    }

    if(b.type==="image"){
      var img=document.createElement("img");
      img.src=b.src;
      img.style.width=(b.width||100)+"%";

      var range=document.createElement("input");
      range.type="range"; range.min=20; range.max=100;
      range.value=b.width||100;
      range.oninput=()=>b.width=range.value;

      el.appendChild(img);
      el.appendChild(range);
    }

    if(b.type==="button"){
      var txt=document.createElement("input");
      txt.value=b.text;
      txt.oninput=()=>b.text=txt.value;

      var link=document.createElement("input");
      link.value=b.link||"";
      link.placeholder="Lien";
      link.oninput=()=>b.link=link.value;

      var select=document.createElement("select");
      ["btn1","btn2","btn3"].forEach(s=>{
        var opt=document.createElement("option");
        opt.value=s;
        opt.text=s;
        select.appendChild(opt);
      });
      select.onchange=()=>b.style=select.value;

      el.appendChild(txt);
      el.appendChild(link);
      el.appendChild(select);
    }

    editor.appendChild(el);
  });

  renderPreview();
}

/* PREVIEW */
function renderPreview(){
  preview.innerHTML="";

  blocks.forEach(b=>{
