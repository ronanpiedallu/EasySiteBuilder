<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Builder Pro Stable</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
  display:flex;
  background:#020617;
  color:white;
}

.sidebar{
  width:250px;
  background:#0f172a;
  padding:20px;
}

button{
  width:100%;
  margin-bottom:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#4f46e5;
  color:white;
}

.main{
  flex:1;
  padding:20px;
}

.builder{
  display:flex;
  gap:20px;
}

.editor{
  flex:1;
  background:#111827;
  padding:15px;
  border-radius:10px;
}

.preview{
  width:300px;
  background:white;
  color:black;
  padding:10px;
}

.block{
  background:#1f2937;
  padding:10px;
  margin-bottom:10px;
  border-radius:10px;
  position:relative;
}

.delete{
  position:absolute;
  right:10px;
  top:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">
  <button onclick="add('title')">Titre</button>
  <button onclick="add('text')">Texte</button>
  <button onclick="add('image')">Image</button>
  <button onclick="add('button')">Bouton</button>
</div>

<div class="main">
  <div class="builder">
    <div class="editor" id="editor"></div>
    <div class="preview" id="preview"></div>
  </div>

  <button onclick="exportHTML()">Exporter</button>
</div>

<script>

var blocks = [];
var editor = document.getElementById("editor");
var preview = document.getElementById("preview");

/* ADD BLOCK */
function add(type){

  var obj = {type:type};

  if(type=="title"){ obj.text="Titre"; }

  if(type=="text"){ obj.text="Texte"; obj.size=16; }

  if(type=="image"){
    var url = prompt("URL image");
    if(!url) return;
    obj.src = url;
    obj.width = 100;
  }

  if(type=="button"){
    obj.text="Bouton";
    obj.link="#";
    obj.style="1";
  }

  blocks.push(obj);
  render();
}

/* RENDER */
function render(){

  editor.innerHTML = "";

  for(var i=0;i<blocks.length;i++){

    (function(i){

      var b = blocks[i];
      var el = document.createElement("div");
      el.className="block";

      /* delete */
      var del = document.createElement("span");
      del.innerHTML="✖";
      del.className="delete";
      del.onclick=function(){
        blocks.splice(i,1);
        render();
      };
      el.appendChild(del);

      /* TITLE */
      if(b.type=="title"){
        var inp=document.createElement("input");
        inp.value=b.text;
        inp.style.fontSize="24px";
        inp.oninput=function(){ b.text=inp.value; };
        el.appendChild(inp);
      }

      /* TEXT */
      if(b.type=="text"){
        var txt=document.createElement("textarea");
        txt.value=b.text;
        txt.oninput=function(){ b.text=txt.value; };

        var size=document.createElement("input");
        size.type="range";
        size.min=10;
        size.max=50;
        size.value=b.size;
        size.oninput=function(){ b.size=size.value; };

        el.appendChild(txt);
        el.appendChild(size);
      }

      /* IMAGE */
      if(b.type=="image"){
        var img=document.createElement("img");
        img.src=b.src;
        img.style.width=b.width+"%";

        var range=document.createElement("input");
        range.type="range";
        range.min=10;
        range.max=100;
        range.value=b.width;
        range.oninput=function(){ b.width=range.value; };

        el.appendChild(img);
        el.appendChild(range);
      }

      /* BUTTON */
      if(b.type=="button"){

        var txt=document.createElement("input");
        txt.value=b.text;
        txt.oninput=function(){ b.text=txt.value; };

        var link=document.createElement("input");
        link.value=b.link;
        link.placeholder="Lien";
        link.oninput=function(){ b.link=link.value; };
